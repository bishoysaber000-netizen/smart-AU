name: smart_study_assistant
description: "A complete AI-powered study assistant using Google Gemini."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_generative_ai: ^0.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  intl: ^0.20.2
  share_plus: ^9.0.0
  flutter_markdown: ^0.7.2
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  speech_to_text: ^6.6.2
  uuid: ^4.4.0
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.1
  file_picker: ^8.0.7
  image_picker: ^1.2.2
  syncfusion_flutter_pdf: ^33.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
